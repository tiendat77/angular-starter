<vertical-navigation
  class="bg-base-100 print:hidden"
  [appearance]="$navigationAppearance()"
  [mode]="$isScreenSmall() ? 'over' : 'side'"
  [name]="'main-navigation'"
  [navigation]="$navigation()"
  [opened]="!$isScreenSmall()"
>
  <ng-container verticalNavigationContentHeader>
    <div class="flex h-20 items-center justify-center">
      <logo
        routerLink="/"
        class="w-12 cursor-pointer"
      />
    </div>
  </ng-container>
</vertical-navigation>

<div class="flex h-full w-full min-w-0 flex-auto flex-col">
  <!-- Header -->
  <div class="bg-base-100 sticky inset-x-0 top-0 z-49 flex-0 border-b print:hidden">
    <div class="mx-auto flex min-h-16 w-full items-center p-2 px-4 sm:px-6 md:px-8">
      <div class="flex-1">
        <button
          class="btn btn-circle btn-ghost"
          (click)="toggle()"
        >
          <svg-icon name="heroicons_outline:bars-3-bottom-left" />
        </button>
      </div>

      <div class="ml-auto flex flex-none items-center space-x-0.5 pl-2 sm:space-x-2">
        <!-- <user /> -->
        <!-- <notification /> -->
        <theme-toggler />
      </div>
    </div>
  </div>

  <!-- Content -->
  <div class="flex flex-auto flex-col overflow-hidden">
    <main class="mx-auto flex h-full w-full flex-auto flex-col p-4 sm:p-6 md:p-8">
      <router-outlet />
    </main>
  </div>
</div>
