<button
  #origin
  #trigger="ngMenuTrigger"
  ngMenuTrigger
  class="btn btn-ghost btn-circle"
  aria-label="Change theme"
  [menu]="$menu()"
>
  <svg-icon [name]="$iconName()" />
</button>

<ng-template
  cdkAttachPopoverAsChild
  [cdkConnectedOverlayOpen]="trigger.expanded()"
  [cdkConnectedOverlay]="{ origin, usePopover: 'inline' }"
  [cdkConnectedOverlayPositions]="[
    { originX: 'start', originY: 'bottom', overlayX: 'end', overlayY: 'top', offsetY: 4 },
  ]"
>
  <ul
    #themeMenu="ngMenu"
    ngMenu
    class="menu bg-base-100 rounded-box z-1 mt-2 w-40 p-2 shadow"
  >
    <li>
      <button
        ngMenuItem
        type="button"
        [value]="'light'"
        [class.text-primary-500]="scheme$() === 'light'"
        (click)="setTheme('light')"
      >
        <svg-icon
          name="heroicons_outline:sun"
          class="h-5 w-5"
        />
        Light
      </button>
    </li>
    <li>
      <button
        ngMenuItem
        type="button"
        [value]="'dark'"
        [class.text-primary-500]="scheme$() === 'dark'"
        (click)="setTheme('dark')"
      >
        <svg-icon
          name="heroicons_outline:moon"
          class="h-5 w-5"
        />
        Dark
      </button>
    </li>
    <li>
      <button
        ngMenuItem
        type="button"
        [value]="'system'"
        [class.text-primary-500]="scheme$() === 'system'"
        (click)="setTheme('system')"
      >
        <svg-icon
          name="heroicons_outline:computer-desktop"
          class="h-5 w-5"
        />
        System
      </button>
    </li>
  </ul>
</ng-template>
