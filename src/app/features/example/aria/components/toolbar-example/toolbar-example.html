<div class="space-y-4">
  <h3 class="text-lg font-semibold">Toolbar Example</h3>
  <p class="text-sm text-gray-500">
    A headless, accessible toolbar using <code>@angular/aria</code>. Use arrow keys to navigate.
  </p>

  <div
    ngToolbar
    class="flex items-center gap-4 rounded-lg bg-gray-100 p-2 dark:bg-gray-800"
    aria-label="Text Formatting Tools"
  >
    <div class="flex items-center gap-1">
      <button
        ngToolbarWidget
        type="button"
        value="undo"
        aria-label="Undo"
        class="flex h-10 w-10 items-center justify-center rounded hover:bg-gray-200 focus:ring-2 focus:ring-blue-500 focus:outline-none dark:hover:bg-gray-700"
      >
        <svg-icon name="heroicons_outline:arrow-uturn-left" />
      </button>
      <button
        ngToolbarWidget
        type="button"
        value="redo"
        aria-label="Redo"
        class="flex h-10 w-10 items-center justify-center rounded hover:bg-gray-200 focus:ring-2 focus:ring-blue-500 focus:outline-none dark:hover:bg-gray-700"
      >
        <svg-icon name="heroicons_outline:arrow-uturn-right" />
      </button>
    </div>

    <div class="h-6 w-px bg-gray-300 dark:bg-gray-600"></div>

    <div
      ngToolbarWidgetGroup
      role="radiogroup"
      class="flex items-center gap-1"
      aria-label="Text Alignment"
    >
      <button
        #leftAlign="ngToolbarWidget"
        ngToolbarWidget
        role="radio"
        type="button"
        value="left"
        aria-label="Align Left"
        class="flex h-10 w-10 items-center justify-center rounded hover:bg-gray-200 focus:ring-2 focus:ring-blue-500 focus:outline-none aria-checked:bg-blue-100 aria-checked:text-blue-600 dark:hover:bg-gray-700 dark:aria-checked:bg-blue-900 dark:aria-checked:text-blue-300"
        [aria-checked]="leftAlign.selected()"
      >
        <svg-icon name="heroicons_outline:bars-3-bottom-left" />
      </button>
      <button
        #centerAlign="ngToolbarWidget"
        ngToolbarWidget
        role="radio"
        type="button"
        value="center"
        aria-label="Align Center"
        class="flex h-10 w-10 items-center justify-center rounded hover:bg-gray-200 focus:ring-2 focus:ring-blue-500 focus:outline-none aria-checked:bg-blue-100 aria-checked:text-blue-600 dark:hover:bg-gray-700 dark:aria-checked:bg-blue-900 dark:aria-checked:text-blue-300"
        [aria-checked]="centerAlign.selected()"
      >
        <svg-icon name="heroicons_outline:bars-3" />
      </button>
      <button
        #rightAlign="ngToolbarWidget"
        ngToolbarWidget
        role="radio"
        type="button"
        value="right"
        aria-label="Align Right"
        class="flex h-10 w-10 items-center justify-center rounded hover:bg-gray-200 focus:ring-2 focus:ring-blue-500 focus:outline-none aria-checked:bg-blue-100 aria-checked:text-blue-600 dark:hover:bg-gray-700 dark:aria-checked:bg-blue-900 dark:aria-checked:text-blue-300"
        [aria-checked]="rightAlign.selected()"
      >
        <svg-icon name="heroicons_outline:bars-3-bottom-right" />
      </button>
    </div>
  </div>
</div>
